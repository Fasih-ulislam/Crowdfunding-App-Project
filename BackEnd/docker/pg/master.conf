# ── Master postgresql.conf ────────────────────────────────────────────────────
# This is the file your instructor referred to — these settings enable
# streaming replication from master to replica

listen_addresses = '*'
port = 5432

# Replication settings
wal_level = replica              # write-ahead log must be 'replica' or 'logical' for replication
max_wal_senders = 3              # max simultaneous replication connections from replicas
wal_keep_size = 64               # MB of WAL segments to keep for replicas that fall behind
max_replication_slots = 3        # replication slots prevent master from discarding WAL replicas still need

# Performance
shared_buffers = 128MB
max_connections = 100

# Logging (helpful during demo)
log_connections = on
log_replication_commands = on
