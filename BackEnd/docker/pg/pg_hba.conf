# ── pg_hba.conf ───────────────────────────────────────────────────────────────
# Controls WHO can connect to Postgres and HOW they authenticate
# This is the second file your instructor mentioned
# Format: TYPE  DATABASE        USER            ADDRESS         METHOD

# Local connections
local   all             all                                     trust
host    all             all             127.0.0.1/32            md5
host    all             all             ::1/128                 md5

# Allow all users to connect from within Docker network
host    all             all             0.0.0.0/0               md5

# Allow replication connections from replica container
# 'replication' is a special keyword — not a real DB name
host    replication     all             0.0.0.0/0               md5
