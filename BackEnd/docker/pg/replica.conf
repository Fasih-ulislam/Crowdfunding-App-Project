# ── Replica postgresql.conf ───────────────────────────────────────────────────
# Replica receives WAL stream from master and applies it continuously
# hot_standby = on means the replica accepts read-only queries while replicating

listen_addresses = '*'
port = 5432

# Standby settings
hot_standby = on                 # allow read queries on replica while it replicates
hot_standby_feedback = on        # replica tells master what queries are running (prevents conflicts)

# Performance
shared_buffers = 128MB
max_connections = 100

# Logging
log_connections = on
