# ── nginx.conf ────────────────────────────────────────────────────────────────
# Nginx acts as:
# 1. Reverse proxy — all traffic hits :80, Nginx forwards to Node
# 2. Load balancer — distributes requests across Node :3000 and :3001

events {
  worker_connections 1024;
}

http {

  # Upstream block defines the pool of Node.js servers to balance across
  # Nginx default algorithm is round-robin — request 1 → :3000, request 2 → :3001, etc.
  upstream trustfund_backend {
    server host.docker.internal:3000;   # Node instance 1
    server host.docker.internal:3001;   # Node instance 2

    # keepalive: reuse connections to backend instead of opening new ones each time
    keepalive 32;
  }

  server {
    listen 80;
    server_name localhost;

    # ── Stripe webhook — special handling ─────────────────────────────────
    # Webhook needs raw body — route it directly, no buffering
    location /api/payments/webhook {
      proxy_pass http://trustfund_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Disable request buffering — Stripe signature verification needs raw body
      proxy_request_buffering off;
    }

    # ── All other API routes ───────────────────────────────────────────────
    location / {
      proxy_pass http://trustfund_backend;
      proxy_http_version 1.1;

      # Required for keepalive connections to upstream
      proxy_set_header Connection "";

      # Pass real client info to Node
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Timeouts
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }
  }
}
